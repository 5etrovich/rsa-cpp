name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y g++ libssl-dev
    - name: Compile
      run: g++ -std=c++98 -Wall -Wextra -o program *.cpp -lssl -lcrypto
    - name: Run (optional)
      run: ./program